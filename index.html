<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  .game-wrapper {
    position: relative;
    border: 3px solid #444;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0, 200, 0, 0.3), 0 0 80px rgba(0, 0, 0, 0.5);
  }
  canvas {
    display: block;
    border-radius: 5px;
    background: #0a0a0a;
  }
  .hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    color: #fff;
    font-size: 14px;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
  }
  .hud span { margin: 0 8px; }
  .hud .lives { color: #ff6b6b; }
  .hud .score { color: #ffd93d; }
  .hud .level { color: #6bcb77; }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.8);
    border-radius: 5px;
    pointer-events: none;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 48px;
    color: #ffd93d;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(255, 217, 61, 0.5);
  }
  .overlay h2 {
    font-size: 32px;
    color: #6bcb77;
    margin-bottom: 8px;
  }
  .overlay p {
    color: #aaa;
    font-size: 16px;
    margin: 4px 0;
  }
  .overlay .btn {
    pointer-events: all;
    margin-top: 20px;
    padding: 12px 36px;
    font-size: 20px;
    font-family: inherit;
    background: #ffd93d;
    color: #1a1a2e;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 2px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .overlay .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 217, 61, 0.6);
  }
  .overlay .btn:active { transform: scale(0.95); }
  .controls-info {
    color: #888;
    font-size: 12px;
    margin-top: 16px;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="game-wrapper" id="wrapper">
  <canvas id="game"></canvas>
  <div class="hud">
    <div>
      <span>🏆 <span class="score" id="scoreDisplay">0</span></span>
      <span>🎯 <span class="level" id="levelDisplay">1</span></span>
    </div>
    <div>
      <span>💥 <span class="score" id="killsDisplay">0</span></span>
      <span>❤️ <span class="lives" id="livesDisplay">3</span></span>
    </div>
  </div>
  <div class="overlay hidden" id="pauseOverlay">
    <h2>暂停</h2>
    <p>按 P 继续</p>
  </div>
  <div class="overlay" id="menuOverlay">
    <h1>坦 克 大 战</h1>
    <p style="color:#ffd93d;font-size:18px;">TANK BATTLE</p>
    <button class="btn" id="startBtn">开 始 游 戏</button>
    <div class="controls-info">
      <p>⬆⬇⬅➡ 或 WASD 移动</p>
      <p>空格键 发射子弹</p>
      <p>P 暂停游戏</p>
    </div>
  </div>
  <div class="overlay hidden" id="gameoverOverlay">
    <h2 id="gameoverTitle">游戏结束</h2>
    <p>最终得分: <span style="color:#ffd93d;" id="finalScore">0</span></p>
    <button class="btn" id="restartBtn">再 来 一 局</button>
  </div>
  <div class="overlay hidden" id="victoryOverlay">
    <h1 style="color:#6bcb77;">胜 利</h1>
    <p>你消灭了所有敌人!</p>
    <p>得分: <span style="color:#ffd93d;" id="victoryScore">0</span></p>
    <button class="btn" id="nextLevelBtn">下 一 关</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const COLS = 26;
  const ROWS = 26;
  const CELL = 24;
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  // DOM refs
  const $ = id => document.getElementById(id);
  const scoreDisplay = $('scoreDisplay');
  const levelDisplay = $('levelDisplay');
  const killsDisplay = $('killsDisplay');
  const livesDisplay = $('livesDisplay');

  // Audio
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  function playSound(freq, type, duration, vol) {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
  }
  function sfxShoot() { playSound(200, 'square', 0.1, 0.08); }
  function sfxHit() { playSound(80, 'sawtooth', 0.15, 0.05); }
  function sfxExplosion() { playSound(40, 'sawtooth', 0.25, 0.08); }
  function sfxPowerUp() {
    playSound(600, 'square', 0.12, 0.05);
    playSound(800, 'square', 0.12, 0.05);
  }
  function sfxGameOver() { playSound(60, 'sawtooth', 0.4, 0.12); }

  // Game state
  const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, VICTORY: 4 };
  let gameState = STATE.MENU;
  let score = 0, lives = 3, level = 1, kills = 0;
  let player = null;
  let enemies = [], bullets = [], walls = [], powerUps = [], particles = [];
  let enemySpawnTimer = 0, enemySpawnInterval = 180;
  let enemiesRemaining = 0, totalEnemiesThisLevel = 0;
  let basePos = null;
  let respawnTimer = 0;        // frames until respawn (0 = alive / no respawn in progress)
  let playerInvincible = 0;    // invincibility frames after respawn

  // Input
  const keys = {};
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    keys[k] = true;

    if (k === 'p') {
      if (gameState === STATE.PLAYING) {
        gameState = STATE.PAUSED;
        $('pauseOverlay').classList.remove('hidden');
      } else if (gameState === STATE.PAUSED) {
        gameState = STATE.PLAYING;
        $('pauseOverlay').classList.add('hidden');
      }
    }
    if (e.key === ' ' || k === 'j') {
      e.preventDefault();
      if (gameState === STATE.PLAYING && player && player.alive && respawnTimer <= 0) {
        player.shoot();
      }
    }
  });
  document.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
  });

  // ---- helpers ----
  function cellX(col) { return col * CELL + CELL / 2; }
  function cellY(row) { return row * CELL + CELL / 2; }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function rectsOverlap(a, b) {
    return !(a.right <= b.left || a.left >= b.right ||
             a.bottom <= b.top || a.top >= b.bottom);
  }

  function hasWallAt(px, py) {
    for (const w of walls) {
      const b = w.getBounds();
      if (px >= b.left && px < b.right && py >= b.top && py < b.bottom) return true;
    }
    return false;
  }

  // ---- Particle ----
  class Particle {
    constructor(x, y, color, vx, vy) {
      this.x = x; this.y = y;
      this.vx = vx || (Math.random() - 0.5) * 4;
      this.vy = vy || (Math.random() - 0.5) * 4;
      this.life = 1;
      this.decay = 0.02 + Math.random() * 0.04;
      this.color = color;
      this.size = 2 + Math.random() * 3;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw(ctx) {
      ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
      ctx.globalAlpha = 1;
    }
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(x, y, color));
    }
  }

  // ---- Tank ----
  class Tank {
    constructor(x, y, dir, color, speed) {
      this.x = x; this.y = y;
      this.dir = dir; // 0:up 1:right 2:down 3:left
      this.color = color;
      this.speed = speed;
      this.size = CELL * 0.4;
      this.cooldown = 0;
      this.cooldownTime = 30;
      this.alive = true;
      this.hp = 1;
      // AI state
      this.prevX = x;
      this.prevY = y;
      this.stuckFrames = 0;
    }
    getBounds() {
      return {
        left: this.x - this.size, right: this.x + this.size,
        top: this.y - this.size, bottom: this.y + this.size
      };
    }

    // Get walls this tank overlaps
    overlappingWalls() {
      const b = this.getBounds();
      const result = [];
      for (const w of walls) {
        if (rectsOverlap(b, w.getBounds())) result.push(w);
      }
      return result;
    }

    // Push tank out of any overlapping walls. Returns true if any adjustment was made.
    pushOutOfWalls() {
      let changed = false;
      for (let iter = 0; iter < 4; iter++) {
        const ov = this.overlappingWalls();
        if (ov.length === 0) break;
        for (const w of ov) {
          const wb = w.getBounds();
          const b = this.getBounds();
          // Find smallest overlap on each axis, push out on the axis with smaller overlap
          const overlapLeft = b.right - wb.left;
          const overlapRight = wb.right - b.left;
          const overlapTop = b.bottom - wb.top;
          const overlapBottom = wb.bottom - b.top;
          const minX = Math.min(overlapLeft, overlapRight);
          const minY = Math.min(overlapTop, overlapBottom);
          if (minX < minY) {
            if (overlapLeft < overlapRight) this.x = wb.left - this.size;
            else this.x = wb.right + this.size;
          } else {
            if (overlapTop < overlapBottom) this.y = wb.top - this.size;
            else this.y = wb.bottom + this.size;
          }
          changed = true;
        }
      }
      return changed;
    }

    // Push out of base area
    pushOutOfBase() {
      if (!basePos) return;
      const bb = { left: basePos.x - CELL/2, right: basePos.x + CELL/2,
                   top: basePos.y - CELL/2, bottom: basePos.y + CELL/2 };
      const tb = this.getBounds();
      if (!rectsOverlap(tb, bb)) return;
      const ol = tb.right - bb.left, or = bb.right - tb.left;
      const ot = tb.bottom - bb.top, ob = bb.bottom - tb.top;
      if (Math.min(ol, or) < Math.min(ot, ob)) {
        if (ol < or) this.x = bb.left - this.size;
        else this.x = bb.right + this.size;
      } else {
        if (ot < ob) this.y = bb.top - this.size;
        else this.y = bb.bottom + this.size;
      }
    }

    // Push out of other tanks
    pushOutOfTanks(tanks) {
      for (const t of tanks) {
        if (t === this || !t.alive) continue;
        const tb = this.getBounds(), ob = t.getBounds();
        if (!rectsOverlap(tb, ob)) continue;
        const ol = tb.right - ob.left, or = ob.right - tb.left;
        const ot = tb.bottom - ob.top, ob2 = ob.bottom - tb.top;
        if (Math.min(ol, or) < Math.min(ot, ob2)) {
          if (ol < or) this.x = ob.left - this.size;
          else this.x = ob.right + this.size;
        } else {
          if (ot < ob2) this.y = ob.top - this.size;
          else this.y = ob.bottom + this.size;
        }
      }
    }

    tryMove(dx, dy) {
      if (dx === 0 && dy === 0) return false;
      this.x += dx;
      this.y += dy;
      // Clamp to canvas
      this.x = clamp(this.x, this.size, canvas.width - this.size);
      this.y = clamp(this.y, this.size, canvas.height - this.size);
      // Resolve overlaps
      this.pushOutOfWalls();
      this.pushOutOfBase();
      const allTanks = [...enemies];
      if (player && player !== this && player.alive) allTanks.push(player);
      this.pushOutOfTanks(allTanks);
      return true;
    }

    shoot() {
      if (this.cooldown > 0) return;
      let bx = this.x, by = this.y;
      const off = this.size + 3;
      if (this.dir === 0) by -= off;
      else if (this.dir === 1) bx += off;
      else if (this.dir === 2) by += off;
      else bx -= off;
      bullets.push(new Bullet(bx, by, this.dir, this === player));
      this.cooldown = this.cooldownTime;
      sfxShoot();
    }

    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.dir * Math.PI / 2);
      // Body
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size, -this.size * 0.8, this.size * 2, this.size * 1.6);
      // Treads
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(-this.size - 2, -this.size * 0.85, 4, this.size * 1.7);
      ctx.fillRect(this.size - 2, -this.size * 0.85, 4, this.size * 1.7);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 0.5;
      for (let i = -3; i <= 3; i++) {
        const ty = i * this.size * 0.22;
        ctx.beginPath();
        ctx.moveTo(-this.size - 2, ty); ctx.lineTo(-this.size + 2, ty); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(this.size - 2, ty); ctx.lineTo(this.size + 2, ty); ctx.stroke();
      }
      // Barrel
      ctx.fillStyle = '#ccc';
      ctx.fillRect(-3, -this.size - 2, 6, -this.size * 0.5);
      // Turret
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0, 0, this.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }
  }

  // ---- Bullet ----
  class Bullet {
    constructor(x, y, dir, isPlayer) {
      this.x = x; this.y = y;
      this.dir = dir;
      this.speed = 5;
      this.isPlayer = isPlayer;
      this.alive = true;
      this.radius = 2.5;
    }
    update() {
      if (this.dir === 0) this.y -= this.speed;
      else if (this.dir === 1) this.x += this.speed;
      else if (this.dir === 2) this.y += this.speed;
      else this.x -= this.speed;

      if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
        this.alive = false; return;
      }

      // Wall hit
      for (const w of walls) {
        const wb = w.getBounds();
        if (this.x >= wb.left && this.x <= wb.right &&
            this.y >= wb.top && this.y <= wb.bottom) {
          this.alive = false;
          if (w.destructible) {
            w.hp--;
            spawnParticles(w.x, w.y, '#b8860b', 4);
            sfxHit();
            if (w.hp <= 0) walls.splice(walls.indexOf(w), 1);
          } else {
            spawnParticles(this.x, this.y, '#aaa', 2);
          }
          return;
        }
      }

      // Base hit
      if (basePos) {
        const bb = { left: basePos.x - CELL/2 + 3, right: basePos.x + CELL/2 - 3,
                     top: basePos.y - CELL/2 + 3, bottom: basePos.y + CELL/2 - 3 };
        if (this.x >= bb.left && this.x <= bb.right &&
            this.y >= bb.top && this.y <= bb.bottom) {
          this.alive = false;
          if (!this.isPlayer) {
            spawnParticles(basePos.x, basePos.y, '#ff4444', 18);
            sfxExplosion();
            gameOver('基地被摧毁!');
          }
          return;
        }
      }
    }
    draw(ctx) {
      ctx.fillStyle = this.isPlayer ? '#ffd93d' : '#ff6b6b';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ---- Wall ----
  class Wall {
    constructor(col, row, destructible) {
      this.x = cellX(col); this.y = cellY(row);
      this.col = col; this.row = row;
      this.destructible = destructible;
      this.hp = destructible ? 2 : Infinity;
    }
    getBounds() {
      return {
        left: this.x - CELL / 2, right: this.x + CELL / 2,
        top: this.y - CELL / 2, bottom: this.y + CELL / 2
      };
    }
    draw(ctx) {
      if (this.destructible) {
        ctx.fillStyle = this.hp === 2 ? '#b8860b' : '#8b6914';
        ctx.fillRect(this.x - CELL/2 + 1, this.y - CELL/2 + 1, CELL - 2, CELL - 2);
        ctx.strokeStyle = '#6b4e0a';
        ctx.lineWidth = 1;
        ctx.strokeRect(this.x - CELL/2 + 4, this.y - CELL/2 + 3, CELL/2 - 4, CELL/2 - 4);
        ctx.strokeRect(this.x + 1, this.y - CELL/2 + 3, CELL/2 - 4, CELL/2 - 4);
        ctx.strokeRect(this.x - CELL/2 + 4, this.y + 2, CELL/2 - 4, CELL/2 - 4);
        ctx.strokeRect(this.x + 1, this.y + 2, CELL/2 - 4, CELL/2 - 4);
      } else {
        ctx.fillStyle = '#666';
        ctx.fillRect(this.x - CELL/2 + 1, this.y - CELL/2 + 1, CELL - 2, CELL - 2);
        ctx.fillStyle = '#7a7a7a';
        ctx.fillRect(this.x - CELL/2 + 4, this.y - CELL/2 + 4, CELL - 8, CELL - 8);
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        ctx.strokeRect(this.x - CELL/2 + 5, this.y - CELL/2 + 5, CELL - 10, CELL - 10);
      }
    }
  }

  // ---- PowerUp ----
  class PowerUp {
    constructor(x, y, type) {
      this.x = x; this.y = y;
      this.type = type;
      this.timer = 480;
      this.blink = 0;
    }
    getBounds() {
      return {
        left: this.x - CELL/3, right: this.x + CELL/3,
        top: this.y - CELL/3, bottom: this.y + CELL/3
      };
    }
    update() { this.timer--; this.blink = (this.blink + 1) % 30; return this.timer > 0; }
    draw(ctx) {
      if (this.timer < 100 && this.blink > 15) return;
      const colors = { speed: '#00bfff', rapid: '#ff4500', shield: '#ffd700', life: '#00ff00' };
      ctx.fillStyle = colors[this.type] || '#fff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, CELL / 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#000';
      ctx.font = `${CELL * 0.4}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const icons = { speed: 'S', rapid: 'R', shield: 'D', life: '+' };
      ctx.fillText(icons[this.type] || '?', this.x, this.y + 1);
    }
  }

  // ---- Map ----
  function generateMap() {
    walls = [];
    basePos = { x: cellX(COLS - 2), y: cellY(ROWS - 2) };

    // Border
    for (let c = 0; c < COLS; c++) {
      walls.push(new Wall(c, 0, false));
      walls.push(new Wall(c, ROWS - 1, false));
    }
    for (let r = 1; r < ROWS - 1; r++) {
      walls.push(new Wall(0, r, false));
      walls.push(new Wall(COLS - 1, r, false));
    }

    // Base defense
    const baseWalls = [
      [COLS-2, ROWS-3], [COLS-3, ROWS-2], [COLS-3, ROWS-3],
      [COLS-4, ROWS-2], [COLS-2, ROWS-4], [COLS-4, ROWS-4],
      [COLS-5, ROWS-3], [COLS-3, ROWS-5],
    ];
    for (const [c, r] of baseWalls) {
      walls.push(new Wall(c, r, Math.random() > 0.3 ? false : true));
    }

    // Safe zones (no walls)
    function isSafe(c, r) {
      // Player spawn area (top-left)
      if (c <= 2 && r <= 2) return true;
      if (c <= 2 && r >= ROWS - 3) return true;
      // Enemy spawn area (top-right)
      if (c >= COLS - 3 && r <= 2) return true;
      // Base area
      if (c >= COLS - 4 && r >= ROWS - 3) return true;
      // Center lane keep somewhat open
      if (Math.abs(c - COLS/2) < 2 && Math.abs(r - ROWS/2) < 2) return true;
      return false;
    }

    const density = 0.18 + level * 0.03;
    for (let r = 1; r < ROWS - 1; r++) {
      for (let c = 1; c < COLS - 1; c++) {
        if (isSafe(c, r)) continue;
        if ((r + c) % 2 === 0 && Math.random() < density) {
          walls.push(new Wall(c, r, Math.random() < 0.7));
        }
      }
    }

    // Clear additional lanes to ensure pathfinding works
    for (let i = 0; i < 6; i++) {
      const r = 3 + Math.floor(Math.random() * (ROWS - 6));
      const c = 3 + Math.floor(Math.random() * (COLS - 6));
      for (let w = walls.length - 1; w >= 0; w--) {
        if (walls[w].col === c && walls[w].row === r && walls[w].destructible) {
          walls.splice(w, 1);
        }
      }
      // Clear adjacent too for wider lanes
      const dc = Math.random() > 0.5 ? 1 : 0;
      const dr = dc ? 0 : 1;
      for (let w = walls.length - 1; w >= 0; w--) {
        if (walls[w].col === c + dc && walls[w].row === r + dr && walls[w].destructible) {
          walls.splice(w, 1);
        }
      }
    }
  }

  // ---- Spawning ----
  function isCellClear(c, r) {
    const cx = cellX(c), cy = cellY(r);
    // Walls
    for (const w of walls) {
      const wb = w.getBounds();
      if (Math.abs(cx - w.x) < CELL && Math.abs(cy - w.y) < CELL) return false;
    }
    // Enemy tanks
    for (const e of enemies) {
      if (e.alive && dist({x: cx, y: cy}, e) < CELL * 2) return false;
    }
    // Player
    if (player && player.alive && dist({x: cx, y: cy}, player) < CELL * 2) return false;
    return true;
  }

  function spawnEnemy() {
    if (enemiesRemaining <= 0) return false;
    // Find a clear spawn position
    const candidates = [];
    for (let c = COLS - 3; c <= COLS - 2; c++) {
      for (let r = 1; r <= 2; r++) {
        if (isCellClear(c, r)) candidates.push({c, r});
      }
    }
    if (candidates.length === 0) {
      // Try wider area
      for (let c = COLS - 6; c <= COLS - 2; c++) {
        for (let r = 1; r <= 3; r++) {
          if (isCellClear(c, r)) candidates.push({c, r});
        }
      }
    }
    if (candidates.length === 0) return false;

    const pos = candidates[Math.floor(Math.random() * candidates.length)];
    const x = cellX(pos.c), y = cellY(pos.r);

    const spd = 0.8 + level * 0.15;
    const types = [
      { color: '#e74c3c', speed: spd, hp: 1, name: 'basic' },
      { color: '#e67e22', speed: spd * 1.35, hp: 1, name: 'fast' },
      { color: '#9b59b6', speed: spd * 0.75, hp: level >= 3 ? 2 : 1, name: 'heavy' },
    ];
    const t = types[Math.floor(Math.random() * Math.min(3, 1 + Math.floor(level / 2) + (Math.random() > 0.6 ? 1 : 0)))];
    const e = new Tank(x, y, 2, t.color, t.speed);
    e.hp = t.hp;
    e.aiTimer = 0;
    e.aiChangeInterval = 40 + Math.floor(Math.random() * 80);
    e.aiShootChance = 0.006 + level * 0.003;
    e.prevX = x;
    e.prevY = y;
    enemies.push(e);
    enemiesRemaining--;
    return true;
  }

  function spawnPowerUp() {
    if (powerUps.length >= 3) return;
    for (let attempts = 0; attempts < 20; attempts++) {
      const c = 2 + Math.floor(Math.random() * (COLS - 4));
      const r = 2 + Math.floor(Math.random() * (ROWS - 4));
      if (!isCellClear(c, r)) continue;
      const x = cellX(c), y = cellY(r);
      const types = ['speed', 'rapid', 'shield', 'life'];
      const type = types[Math.floor(Math.random() * types.length)];
      powerUps.push(new PowerUp(x, y, type));
      return;
    }
  }

  function applyPowerUp(pu) {
    sfxPowerUp();
    switch (pu.type) {
      case 'speed':
        player.speed = Math.min(player.speed + 0.4, 3.5);
        break;
      case 'rapid':
        player.cooldownTime = Math.max(player.cooldownTime - 8, 6);
        break;
      case 'shield':
        player.hp = Math.min(player.hp + 1, 3);
        break;
      case 'life':
        lives = Math.min(lives + 1, 5);
        break;
    }
  }

  // ---- AI ----
  function aiUpdate(enemy) {
    if (!enemy.alive) return;

    // Check if stuck by comparing position to last frame
    const moved = Math.abs(enemy.x - enemy.prevX) + Math.abs(enemy.y - enemy.prevY);
    if (moved < 0.3) {
      enemy.stuckFrames++;
    } else {
      enemy.stuckFrames = 0;
    }
    enemy.prevX = enemy.x;
    enemy.prevY = enemy.y;

    // If stuck for too long, change direction
    if (enemy.stuckFrames > 25) {
      enemy.dir = (enemy.dir + 1 + Math.floor(Math.random() * 3)) % 4;
      enemy.stuckFrames = 0;
      enemy.aiTimer = 0;
    }

    enemy.aiTimer++;
    // Periodic direction change
    if (enemy.aiTimer >= enemy.aiChangeInterval) {
      enemy.aiTimer = 0;
      enemy.aiChangeInterval = 40 + Math.floor(Math.random() * 100);
      // Sometimes target base or player
      if (Math.random() < 0.35 && basePos) {
        const tx = basePos.x, ty = basePos.y;
        if (Math.abs(tx - enemy.x) > Math.abs(ty - enemy.y)) {
          enemy.dir = tx > enemy.x ? 1 : 3;
        } else {
          enemy.dir = ty > enemy.y ? 2 : 0;
        }
      } else if (Math.random() < 0.25 && player && player.alive) {
        const tx = player.x, ty = player.y;
        if (Math.abs(tx - enemy.x) > Math.abs(ty - enemy.y)) {
          enemy.dir = tx > enemy.x ? 1 : 3;
        } else {
          enemy.dir = ty > enemy.y ? 2 : 0;
        }
      } else {
        enemy.dir = Math.floor(Math.random() * 4);
      }
    }

    // Move
    let dx = 0, dy = 0;
    if (enemy.dir === 0) dy = -enemy.speed;
    else if (enemy.dir === 1) dx = enemy.speed;
    else if (enemy.dir === 2) dy = enemy.speed;
    else dx = -enemy.speed;
    enemy.tryMove(dx, dy);

    // Shoot
    if (enemy.cooldown <= 0 && Math.random() < enemy.aiShootChance) {
      enemy.shoot();
    }
    if (enemy.cooldown > 0) enemy.cooldown--;
  }

  // ---- Game flow ----
  function gameOver(msg) {
    if (gameState !== STATE.PLAYING) return;
    gameState = STATE.GAMEOVER;
    $('gameoverTitle').textContent = msg || '游戏结束';
    $('finalScore').textContent = score;
    $('gameoverOverlay').classList.remove('hidden');
    sfxGameOver();
  }

  function victory() {
    if (gameState !== STATE.PLAYING) return;
    gameState = STATE.VICTORY;
    $('victoryScore').textContent = score;
    $('victoryOverlay').classList.remove('hidden');
  }

  function startGame() {
    initAudio();
    gameState = STATE.PLAYING;
    score = 0; lives = 3; level = 1; kills = 0;
    enemies = []; bullets = []; powerUps = []; particles = [];
    enemySpawnTimer = 0;
    respawnTimer = 0;
    playerInvincible = 0;
    totalEnemiesThisLevel = 6 + level * 2;
    enemiesRemaining = totalEnemiesThisLevel;
    enemySpawnInterval = Math.max(50, 160 - level * 10);

    generateMap();
    player = new Tank(cellX(2), cellY(2), 1, '#4ecdc4', 1.8);
    player.hp = 1;
    player.cooldownTime = 25;

    $('menuOverlay').classList.add('hidden');
    $('gameoverOverlay').classList.add('hidden');
    $('victoryOverlay').classList.add('hidden');
    $('pauseOverlay').classList.add('hidden');
    updateHUD();
  }

  function nextLevel() {
    level++;
    enemies = []; bullets = []; powerUps = []; particles = [];
    enemySpawnTimer = 0;
    respawnTimer = 0;
    playerInvincible = 0;
    totalEnemiesThisLevel = 6 + level * 2;
    enemiesRemaining = totalEnemiesThisLevel;
    enemySpawnInterval = Math.max(50, 160 - level * 10);

    generateMap();
    player.x = cellX(2);
    player.y = cellY(2);
    player.dir = 1;
    player.alive = true;
    player.hp = 1;
    player.cooldownTime = Math.max(10, 25 - level);
    player.speed = Math.min(3.5, 1.8 + level * 0.15);
    player.cooldown = 0;

    gameState = STATE.PLAYING;
    $('victoryOverlay').classList.add('hidden');
    updateHUD();
  }

  function respawnPlayer() {
    if (lives <= 0) {
      gameOver('你被击败了!');
      return;
    }
    // Try to find a clear spawn
    const spawnPositions = [[2,2], [1,1], [2,1], [1,2],
                             [2,ROWS-3], [1,ROWS-2], [2,ROWS-2]];
    for (const [c, r] of spawnPositions) {
      if (isCellClear(c, r)) {
        player = new Tank(cellX(c), cellY(r), 1, '#4ecdc4', player ? Math.min(player.speed, 3.5) : 1.8);
        player.cooldownTime = Math.max(10, 25 - level);
        player.hp = 1;
        player.alive = true;
        playerInvincible = 90; // 1.5 seconds invincibility
        respawnTimer = 0;
        updateHUD();
        return;
      }
    }
    // Fallback: just spawn at (2,2) and push out
    player = new Tank(cellX(2), cellY(2), 1, '#4ecdc4', 1.8);
    player.cooldownTime = Math.max(10, 25 - level);
    player.hp = 1;
    player.alive = true;
    playerInvincible = 90;
    respawnTimer = 0;
    player.pushOutOfWalls();
    player.pushOutOfBase();
    updateHUD();
  }

  function killPlayer() {
    player.alive = false;
    spawnParticles(player.x, player.y, '#ff0000', 20);
    sfxExplosion();
    lives--;
    respawnTimer = 60; // 1 second before respawn
    if (lives <= 0) {
      respawnTimer = 60; // Still show brief death before game over
    }
    updateHUD();
  }

  function updateHUD() {
    scoreDisplay.textContent = score;
    levelDisplay.textContent = level;
    killsDisplay.textContent = kills;
    livesDisplay.textContent = '❤'.repeat(Math.max(0, lives));
  }

  // ---- Main update ----
  function update() {
    if (gameState !== STATE.PLAYING) return;

    // Handle respawn countdown
    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer <= 0 && lives > 0) {
        respawnPlayer();
      } else if (respawnTimer <= 0 && lives <= 0) {
        gameOver('你被击败了!');
      }
    }
    if (playerInvincible > 0) playerInvincible--;

    // Player movement & shooting
    if (player && player.alive && respawnTimer <= 0) {
      let dx = 0, dy = 0;
      if (keys['arrowup']    || keys['w']) dy = -player.speed;
      if (keys['arrowdown']  || keys['s']) dy = player.speed;
      if (keys['arrowleft']  || keys['a']) dx = -player.speed;
      if (keys['arrowright'] || keys['d']) dx = player.speed;

      if (dx !== 0 || dy !== 0) {
        // Prioritize the larger axis for direction
        if (Math.abs(dx) >= Math.abs(dy)) {
          player.dir = dx > 0 ? 1 : 3;
          dy = 0;
        } else {
          player.dir = dy > 0 ? 2 : 0;
          dx = 0;
        }
        player.tryMove(dx, dy);
      }
      if (player.cooldown > 0) player.cooldown--;
    }

    // AI
    for (const e of enemies) {
      if (e.alive) aiUpdate(e);
    }

    // Bullets
    for (const b of bullets) {
      if (b.alive) b.update();
    }

    // Bullet vs tanks
    for (const b of bullets) {
      if (!b.alive) continue;
      // Player bullets vs enemies
      if (b.isPlayer) {
        for (const e of enemies) {
          if (!e.alive) continue;
          const eb = e.getBounds();
          if (b.x >= eb.left && b.x <= eb.right && b.y >= eb.top && b.y <= eb.bottom) {
            b.alive = false;
            e.hp--;
            if (e.hp <= 0) {
              e.alive = false;
              kills++;
              score += 100;
              spawnParticles(e.x, e.y, e.color, 12);
              sfxExplosion();
              if (Math.random() < 0.3) spawnPowerUp();
            } else {
              spawnParticles(b.x, b.y, '#fff', 4);
              sfxHit();
            }
            break; // bullet can only hit one tank
          }
        }
      }
      // Enemy bullets vs player
      if (!b.isPlayer && b.alive && player && player.alive && respawnTimer <= 0 && playerInvincible <= 0) {
        const pb = player.getBounds();
        if (b.x >= pb.left && b.x <= pb.right && b.y >= pb.top && b.y <= pb.bottom) {
          b.alive = false;
          player.hp--;
          spawnParticles(player.x, player.y, '#ff6b6b', 8);
          sfxHit();
          if (player.hp <= 0) {
            killPlayer();
          }
        }
      }
    }

    // Bullet vs bullet
    for (let i = 0; i < bullets.length; i++) {
      if (!bullets[i].alive) continue;
      for (let j = i + 1; j < bullets.length; j++) {
        if (!bullets[j].alive) continue;
        if (bullets[i].isPlayer !== bullets[j].isPlayer) {
          if (Math.abs(bullets[i].x - bullets[j].x) < 5 &&
              Math.abs(bullets[i].y - bullets[j].y) < 5) {
            bullets[i].alive = false;
            bullets[j].alive = false;
            spawnParticles((bullets[i].x + bullets[j].x) / 2, (bullets[i].y + bullets[j].y) / 2, '#fff', 3);
          }
        }
      }
    }

    // Enemy vs enemy separation
    for (let i = 0; i < enemies.length; i++) {
      if (!enemies[i].alive) continue;
      for (let j = i + 1; j < enemies.length; j++) {
        if (!enemies[j].alive) continue;
        if (rectsOverlap(enemies[i].getBounds(), enemies[j].getBounds())) {
          enemies[i].pushOutOfTanks([enemies[j]]);
        }
      }
    }
    // Player vs enemy separation
    if (player && player.alive) {
      for (const e of enemies) {
        if (e.alive && rectsOverlap(player.getBounds(), e.getBounds())) {
          player.pushOutOfTanks([e]);
        }
      }
    }

    // PowerUp pickups
    if (player && player.alive && respawnTimer <= 0) {
      for (let i = powerUps.length - 1; i >= 0; i--) {
        if (rectsOverlap(player.getBounds(), powerUps[i].getBounds())) {
          applyPowerUp(powerUps[i]);
          powerUps.splice(i, 1);
        }
      }
    }

    // Timed updates
    for (let i = powerUps.length - 1; i >= 0; i--) {
      if (!powerUps[i].update()) powerUps.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // Spawn enemies
    enemySpawnTimer++;
    if (enemySpawnTimer >= enemySpawnInterval && enemiesRemaining > 0) {
      enemySpawnTimer = 0;
      if (enemies.filter(e => e.alive).length < 5) {
        spawnEnemy();
      }
    }

    // Clean dead
    enemies = enemies.filter(e => e.alive || e === player); // keep dead player for reference
    enemies = enemies.filter(e => e.alive);
    bullets = bullets.filter(b => b.alive);

    // Victory
    if (enemiesRemaining <= 0 && enemies.length === 0) {
      victory();
    }

    updateHUD();
  }

  // ---- Rendering ----
  function drawGrid() {
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(c * CELL, 0);
      ctx.lineTo(c * CELL, canvas.height);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * CELL);
      ctx.lineTo(canvas.width, r * CELL);
      ctx.stroke();
    }
  }

  function drawBase() {
    if (!basePos) return;
    // Base
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(basePos.x - CELL/2 + 2, basePos.y - CELL/2 + 2, CELL - 4, CELL - 4);
    ctx.fillStyle = '#27ae60';
    ctx.beginPath();
    ctx.arc(basePos.x, basePos.y, CELL * 0.28, 0, Math.PI * 2);
    ctx.fill();
    // Flag
    ctx.fillStyle = '#eee';
    ctx.fillRect(basePos.x + 1, basePos.y - CELL/3, 2, CELL * 0.42);
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(basePos.x + 3, basePos.y - CELL/3);
    ctx.lineTo(basePos.x + 12, basePos.y - CELL/3 + 5);
    ctx.lineTo(basePos.x + 3, basePos.y - CELL/3 + 10);
    ctx.fill();
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawBase();
    for (const w of walls) w.draw(ctx);
    for (const pu of powerUps) pu.draw(ctx);
    for (const e of enemies) {
      if (e.alive) e.draw(ctx);
    }

    // Player with invincibility blink
    if (player && player.alive && respawnTimer <= 0) {
      if (playerInvincible > 0 && Math.floor(playerInvincible / 4) % 2 === 0) {
        // Skip drawing to blink
      } else {
        player.draw(ctx);
      }
    }

    for (const b of bullets) {
      if (b.alive) b.draw(ctx);
    }
    for (const p of particles) p.draw(ctx);

    // HUD above canvas
    if (gameState === STATE.PLAYING) {
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`剩余敌人: ${enemiesRemaining}`, canvas.width - 8, 14);
      if (respawnTimer > 0) {
        ctx.fillStyle = '#ff6b6b';
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`重生中... ${Math.ceil(respawnTimer / 60)}`, canvas.width / 2, canvas.height / 2 + 40);
      }
    }
  }

  function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  // Button handlers
  $('startBtn').addEventListener('click', startGame);
  $('restartBtn').addEventListener('click', startGame);
  $('nextLevelBtn').addEventListener('click', nextLevel);

  // Initial render
  render();
  gameLoop();
})();
</script>
</body>
</html>
